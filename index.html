<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lonely Architect</title>
<style>
  :root {
    --bg:     #ffffff;
    --ink:    #161616;
    --grey:   #5a5a5a;
    --ash:    #9a9a9a;
    --orange: #ef8b4d;
    --line:   #e4e4e4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-stretch: condensed;
    overflow-x: hidden;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  img, video { display: block; max-width: 100%; }

  /* ---------- Hero ---------- */
  .hero {
    width: 100%;
    background: var(--bg);
  }
  .hero img.hero-art {
    width: 100%;
    height: auto;
    display: block;
  }

  .hero-sub {
    text-align: center;
    padding: 2.2rem 6vw 3.5rem;
  }

  .tagline {
    max-width: 46ch;
    margin: 0 auto;
    font-size: clamp(0.95rem, 1.6vw, 1.15rem);
    font-weight: 400;
    letter-spacing: 0.01em;
    line-height: 1.7;
    color: var(--grey);
    opacity: 0;
    animation: rise 1s ease forwards 0.2s;
  }

  .links-row {
    margin-top: 1.6rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    opacity: 0;
    animation: rise 1s ease forwards 0.4s;
  }

  .itch-icon {
    height: 18px;
    width: auto;
  }

  .itch-link {
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    color: var(--orange);
    text-decoration: none;
    border-bottom: 1px solid var(--orange);
    padding-bottom: 2px;
    transition: opacity 0.2s ease;
  }
  .itch-link:hover { opacity: 0.6; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Quote & Badge ---------- */
  .accolade-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 6vw 1rem;
    max-width: 640px;
    margin: 0 auto;
    gap: 1.5rem;
  }
  .badge-img {
    max-height: 120px;
    width: auto;
  }
  .quote-section {
    text-align: center;
  }
  .quote-section blockquote {
    font-size: clamp(1.05rem, 2vw, 1.3rem);
    font-style: italic;
    line-height: 1.6;
    color: var(--ink);
  }
  .quote-section cite {
    display: block;
    margin-top: 1rem;
    font-size: 0.78rem;
    font-style: normal;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--orange);
  }

  /* ---------- Media section ---------- */
  .media {
    padding: 1rem 6vw 5rem;
    max-width: 1000px;
    margin: 0 auto;
  }
  .media-frame {
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    background: #fafafa;
  }
  .media-frame img,
  .media-frame video {
    width: 100%;
    display: block;
  }
  .media-caption {
    margin-top: 0.9rem;
    font-size: 0.92rem;
    letter-spacing: 0.01em;
    text-transform: none;
    color: var(--grey);
    text-align: center;
    max-width: 50ch;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  .media-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2.5rem;
    margin-top: 2.5rem;
  }

  /* ---------- Notify section ---------- */
  .notify {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 7vh 6vw;
    border-top: 1px solid var(--line);
  }

  .notify h2 {
    font-weight: 700;
    font-size: clamp(1.5rem, 4vw, 2.1rem);
    letter-spacing: 0.01em;
    margin-bottom: 0.9rem;
  }

  .notify p {
    color: var(--grey);
    font-size: 0.95rem;
    max-width: 36ch;
    line-height: 1.7;
    margin-bottom: 2.3rem;
  }

  form {
    display: flex;
    width: 100%;
    max-width: 420px;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 0.5rem;
  }

  input[type="email"] {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    padding: 0.4rem 0.2rem;
  }
  input[type="email"]::placeholder { color: var(--ash); }

  button {
    background: var(--orange);
    border: none;
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #fff;
    cursor: pointer;
    padding: 0.5rem 1.1rem;
    border-radius: 3px;
    margin-left: 0.6rem;
    transition: opacity 0.2s ease;
  }
  button:hover { opacity: 0.8; }
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--orange);
    outline-offset: 3px;
  }

  .status {
    margin-top: 1.2rem;
    font-size: 0.8rem;
    color: var(--grey);
    min-height: 1.2em;
  }

  .platform {
    margin-top: 2.6rem;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ash);
  }

  .itch-secondary {
    margin-top: 0.6rem;
    font-size: 0.78rem;
    color: var(--grey);
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .itch-secondary a {
    color: var(--orange);
    text-decoration: none;
    border-bottom: 1px solid var(--orange);
  }

  footer {
    text-align: center;
    padding: 2.5rem 6vw 3.5rem;
    font-size: 0.7rem;
    color: var(--ash);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<main>
  <section class="hero">
    <img src="hero.png" class="hero-art" alt="THE LONELY ARCHITECT">
    <div class="hero-sub">
      <p class="tagline">The Lonely Architect is a 2D atmospheric platformer set inside the subconscious of an isolated, overworked architect. What started as a demo that placed in the Top 25 for the 2024 'Safe In Our World' Game Jam is now the debut title from solo developer Odaro Eguavoen (Ekosodi Games).</p>
      <div class="links-row">
